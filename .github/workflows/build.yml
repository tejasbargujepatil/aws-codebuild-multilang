name: Multi-Language Build and Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  run-python:
    name: Run Python Program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show Python version
        run: python --version

      - name: Run numbers.py
        run: python python/numbers.py

  run-java:
    name: Compile and Run Java Program
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Show Java version
        run: java -version

      - name: Compile Numbers.java
        run: javac java/Numbers.java

      - name: Run Numbers
        run: java -cp java Numbers

  deploy-to-ec2:
    name: Deploy to EC2 via SSH
    runs-on: ubuntu-latest
    needs: [run-python, run-java]   # only runs if both above pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install paramiko
        run: pip install paramiko

      - name: Write SSH key to file
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/deploy_key.pem
          chmod 400 ~/.ssh/deploy_key.pem

      - name: Run auto_deploy.py
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: python auto_deploy.py

      - name: Clean up SSH key
        if: always()    # runs even if deploy fails — cleans up key
        run: rm -f ~/.ssh/deploy_key.pem
